# ===== Prefix =====
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ===== General =====
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",tmux-256color:Tc"
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0

# ===== Mouse =====
set -g mouse on
# iPad-like smooth scrolling: 1 line per event so iOS momentum feels natural
bind -T root WheelUpPane \
  if-shell -F "#{alternate_on}" \
    "send-keys -M" \
    "select-pane -t=; copy-mode -e; send-keys -X -N 1 scroll-up"
bind -T root WheelDownPane \
  if-shell -F "#{alternate_on}" \
    "send-keys -M" \
    "select-pane -t=; send-keys -X -N 1 scroll-down"
bind -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down

# ===== Phone-friendly: right-click context menu =====
bind-key -T root MouseDown3Pane display-menu -T "tmux" -x M -y M \
  "New Window"        n "new-window -c '#{pane_current_path}'" \
  "Split Horizontal"  h "split-window -h -c '#{pane_current_path}'" \
  "Split Vertical"    v "split-window -v -c '#{pane_current_path}'" \
  "" \
  "Next Window"       r "next-window" \
  "Prev Window"       p "previous-window" \
  "" \
  "Copy Mode"         c "copy-mode" \
  "Paste"             P "paste-buffer" \
  "" \
  "Kill Pane"         x "kill-pane" \
  "Kill Window"       X "kill-window"

# ===== Help popup =====
bind ? display-popup -E -w 60 -h 28 "~/.config/tmux/help.sh | less -R"

# ===== Reload config =====
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ===== Vi keys =====
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ===== Splits (open in current dir) =====
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ===== Status bar =====
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left " #S "
set -g status-left-style "bg=#89b4fa,fg=#1e1e2e,bold"
set -g status-right " %H:%M  %d %b "
set -g status-right-style "bg=#313244,fg=#cdd6f4"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=#313244,fg=#89b4fa,bold"
