# ===== Prefix =====
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ===== General =====
set -g default-terminal "tmux-256color"
set -g terminal-overrides ",xterm-256color:Tc,tmux-256color:Tc,*:Ms=\\E]52;c;%p2%s\\007"
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 50             # give tmux time to process escape sequences from fast TUI output
set -g assume-paste-time 0       # disable paste detection — fixes getting stuck in paste mode
set -g focus-events on          # lets neovim autoread files when you switch back
set -g aggressive-resize on     # resize to active client, not smallest (phone+desktop same session)
set -g word-separators " -_@:,." # better double-tap word boundaries for paths/URLs
set -g pane-border-lines heavy  # thicker borders = easier to tap on touch screen (tmux 3.2+)

# ===== Mouse =====
set -g mouse on
# Prevent mouse scroll from entering copy-mode when a full-screen app (like Claude Code) is running
# Only enter copy-mode on scroll when in alternate screen is OFF (i.e. normal shell)
bind -n WheelUpPane if-shell -F "#{alternate_on}" "send-keys -M" "select-pane -t= ; copy-mode -e ; send-keys -M"
bind -n WheelDownPane if-shell -F "#{alternate_on}" "send-keys -M" "select-pane -t= ; send-keys -M"

# ===== Phone-friendly: right-click context menu =====
bind-key -T root MouseDown3Pane display-menu -T "tmux" -x M -y M \
  "Copy Mode (scroll & select)"  c "copy-mode" \
  "Copy Line"                    y "copy-mode \; send -X select-line \; send -X copy-selection-and-cancel" \
  "Paste"                        p "paste-buffer" \
  "" \
  "New Window"        n "new-window -c '#{pane_current_path}'" \
  "Split Horizontal"  h "split-window -h -c '#{pane_current_path}'" \
  "Split Vertical"    v "split-window -v -c '#{pane_current_path}'" \
  "" \
  "Next Window"       r "next-window" \
  "Prev Window"       P "previous-window" \
  "" \
  "Kill Pane"         x "kill-pane" \
  "Kill Window"       X "kill-window"

# ===== Help popup =====
bind ? display-popup -E -w 60 -h 28 "~/.config/tmux/help.sh | less -R"

# ===== Reload config =====
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Emergency: reset bracketed paste mode (C-a R)
bind R send-keys -l '\e[?2004l' \; display "Paste mode reset!"

# ===== Clipboard (OSC 52 — lets tmux write to iOS/system clipboard) =====
set -g set-clipboard on
set -g allow-passthrough off     # was 'on' — leaked escape sequences cause scroll/paste bugs with Claude Code

# ===== Vi keys =====
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi Y   send -X copy-line  # copy whole line, no selection needed

# Mouse drag to copy (release to copy selection automatically)
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# Double-tap to select and copy a word
bind -T root DoubleClick1Pane \
  select-pane -t= \; copy-mode -e \; send -X select-word \; send -X copy-selection-and-cancel
# Triple-tap to select and copy a whole line
bind -T root TripleClick1Pane \
  select-pane -t= \; copy-mode -e \; send -X select-line \; send -X copy-selection-and-cancel

# Copy last command output (everything between last two prompts)
bind P copy-mode \; send -X start-of-line \; send -X search-backward "\\$"

# ===== Splits (open in current dir) =====
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ===== Status bar =====
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left " #S "
set -g status-left-style "bg=#89b4fa,fg=#1e1e2e,bold"
set -g status-right " %H:%M  %d %b "
set -g status-right-style "bg=#313244,fg=#cdd6f4"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=#313244,fg=#89b4fa,bold"
